# ASTROMEDA Reviews App - Shopify Admin Embedded App Configuration
# Project Code: REV-EMB-2026-Q2
# Owner: 株式会社マイニングベース

# client_id は `shopify app config link` 実行時に Partner Dashboard の
# 新規アプリ作成後に自動で埋まる。
client_id = ""

# Embedded App 表示名 (Shopify Admin サイドバーに表示される)
name = "astromeda-reviews"
handle = "astromeda-reviews"
application_url = "https://astromeda-reviews-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "staging-mining-base.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# 口コミ機能で必要な scope:
# - read_orders: Webhook (orders/fulfilled) で発注情報を取得
# - read_customers: お客様の氏名・メールアドレス取得
# - read_products / write_products: 商品取得 + 商品 metafield (astromeda.reviews_html / approved_reviews) への書き込み
# - read/write_metaobjects: Metaobject CRUD
# - read/write_metaobject_definitions: Metaobject 定義作成 (初回 setup)
# - read/write_files: お客様アップロード写真を Shopify Files へ保存
# - read_content: Storefront 表示連携時に Article/Page の参照
scopes = "read_orders,read_customers,read_products,write_products,read_metaobjects,write_metaobjects,read_metaobject_definitions,write_metaobject_definitions,read_files,write_files,read_content"

[auth]
redirect_urls = [
  "https://astromeda-reviews-app.vercel.app/auth/callback",
  "https://astromeda-reviews-app.vercel.app/auth/shopify/callback",
  "https://astromeda-reviews-app.vercel.app/api/auth/callback"
]

[webhooks]
api_version = "2025-01"
