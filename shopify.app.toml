# ASTROMEDA Reviews App - Shopify Admin Embedded App Configuration
# Project Code: REV-EMB-2026-Q2
# Owner: 株式会社マイニングベース

# client_id は `shopify app config link` 実行時に Partner Dashboard の
# 新規アプリ作成後に自動で埋まる。
client_id = ""

# Embedded App 表示名 (Shopify Admin サイドバーに表示される)
name = "astromeda-reviews"
handle = "astromeda-reviews"
application_url = "https://astromeda-reviews-app.vercel.app"
embedded = true

[build]
automatically_update_urls_on_dev = true
dev_store_url = "staging-mining-base.myshopify.com"
include_config_on_deploy = true

[access_scopes]
# 口コミ機能で必要な scope:
# - read_orders: Webhook (orders/fulfilled) で発注情報を取得
# - read_customers: お客様の氏名・メールアドレス取得
# - read_products: 商品情報取得 (レビュー対象商品)
# - read/write_metaobjects: astromeda_review / astromeda_review_token /
#                            astromeda_email_template / astromeda_send_queue /
#                            astromeda_gift_token / astromeda_audit_log の CRUD
# - read/write_metaobject_definitions: Metaobject 定義作成 (初回 setup)
# - read/write_files: お客様アップロード写真を Shopify Files へ保存
# - read_content: Storefront 表示連携時に Article/Pag